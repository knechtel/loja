<?xml version='1.0' encoding='UTF-8' ?> 
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:component xmlns="http://www.w3.org/1999/xhtml"
              xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
              xmlns:h="http://xmlns.jcp.org/jsf/html" 
              xmlns:p="http://primefaces.org/ui"
              xmlns:adm="http://github.com/adminfaces"                    
              xmlns:f="http://xmlns.jcp.org/jsf/core" >


    <ui:insert name="nomePessoaFisica">
        <label jsfc="p:outputLabel" for="nomePessoaFisica" value="Nome*" />
        <input jsfc="p:inputText" id="nomePessoaFisica" value="#{formPessoaFisicaModel.nome}" label="Nome" required="#{formPessoaFisicaModelRequired}"  />
    </ui:insert>

    <ui:insert name="emailPessoaFisica">
        <label jsfc="p:outputLabel" for="emailPessoaFisica" value="Email*" />
        <input jsfc="p:inputText" id="emailPessoaFisica" value="#{formPessoaFisicaModel.email}" label="Email" required="#{formPessoaFisicaModelRequired}" >
        </input>
    </ui:insert>

    <ui:insert name="cpfPessoaFisica">
        <label jsfc="p:outputLabel" for="cpfPessoaFisica" value="Cpf*" />
        <input jsfc="p:inputMask" id="cpfPessoaFisica" value="#{formPessoaFisicaModel.cpf}" label="Cpf" required="#{formPessoaFisicaModelRequired}"
               mask="999.999.999-99"/>
    </ui:insert>

    <ui:insert name="dataNascimentoPessoaFisica">
        <label jsfc="p:outputLabel" for="dataNascimentoPessoaFisica" value="Data Nascimento*" />
        <input jsfc="p:calendar"  id="dataNascimentoPessoaFisica" value="#{formPessoaFisicaModel.dtNascimento}" label="Data Nascimento" required="#{formPessoaFisicaModelRequired}"
               mask="true" pattern="dd/MM/yyyy" converter="#{primefacesCalendarLocalDateConverter}" >
        </input>
    </ui:insert>

</ui:component>
