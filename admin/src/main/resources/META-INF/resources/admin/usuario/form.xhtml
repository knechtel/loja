<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:component xmlns="http://www.w3.org/1999/xhtml"
              xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
              xmlns:h="http://xmlns.jcp.org/jsf/html"
              xmlns:p="http://primefaces.org/ui"
              xmlns:adm="http://github.com/adminfaces"
              xmlns:f="http://xmlns.jcp.org/jsf/core" >
    <div class="ui-fluid">
        <input jsfc="h:inputHidden" value="#{produtoMb.model.idProduto}" />
        <div jsfc="p:panelGrid" columns="1" layout="grid">

            <label jsfc="p:outputLabel" for="habilitado" value="Habilitado*" />

            <select jsfc="p:selectOneMenu" id="habilitado" value="#{usuarioMb.model.enabled}" required="true" >
                <option jsfc="f:selectItem" itemValue="true" itemLabel="Sim" >Sim</option>
                <option jsfc="f:selectItem" itemValue="false" itemLabel="Não" >Não</option>
            </select>

            <label jsfc="p:outputLabel" for="nome" value="Nome*" />
            <input jsfc="p:inputText" id="nome" value="#{usuarioMb.model.nome}" label="Nome" required="true" />

            <label jsfc="p:outputLabel" for="usuario" value="Usuario*" />
            <input jsfc="p:inputText" id="usuario" value="#{usuarioMb.model.username}" readonly="#{usuarioMb.state eq 3}" label="Usuario" required="true" p:autocomplete="off" />

            <label jsfc="p:outputLabel" for="senhaUsuario" value="Senha*" />


            <p:inplace cancelLabel="Cancelar" saveLabel="Salvar"   label="********" editor="true" >
                <input jsfc="h:inputText" id="senhaUsuario" value="#{usuarioMb.model.password}" label="Senha" required="true" p:autocomplete="off"
                       onfocus="this.value = ''" style="width:300px" />
            </p:inplace>
            <label jsfc="p:outputLabel" for="permissao" value="Permissão*" />
            <select jsfc="p:selectOneMenu" id="permissao" value="#{usuarioMb.permissao}"  required="true" >
                <option jsfc="f:selectItem" itemValue="#{null}" itemLabel="Selecione"  noSelectionOption="true"  >Selecione</option>
                <f:selectItems value="#{dataProviderMb.rolesSecurityEnums}" var="item" itemValue="#{item}" itemLabel="#{item.label}" ></f:selectItems>
            </select>

            <label jsfc="p:outputLabel" for="parceiro" value="Associe o login a um parceiro.*" />
            <p:autoComplete id="parceiro" widgetVar="parceiro" forceSelection="true" placeholder="Pesquisar Parceiro" dropdown="true" value="#{usuarioMb.model.parceiro}"  completeMethod="#{usuarioMb.completeText}"
                            var="itemParceiro" itemLabel="#{itemParceiro.pessoa.nome}"  itemValue="#{itemParceiro}" converter="#{parceiroConverter}" required="true" >

            </p:autoComplete>

        </div>
    </div>

</ui:component>
