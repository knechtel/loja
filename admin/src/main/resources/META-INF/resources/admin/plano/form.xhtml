<?xml version='1.0' encoding='UTF-8' ?> 
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:component xmlns="http://www.w3.org/1999/xhtml"
              xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
              xmlns:h="http://xmlns.jcp.org/jsf/html" 
              xmlns:p="http://primefaces.org/ui"
              xmlns:adm="http://github.com/adminfaces"                    
              xmlns:f="http://xmlns.jcp.org/jsf/core" >


    <div class="ui-fluid">
        <input jsfc="h:inputHidden" value="#{crudPlanoMb.model.idPlano}" />
        <div jsfc="p:panelGrid" columns="1" layout="grid">

            <label jsfc="p:outputLabel" for="habilitado" value="Habilitado*" />

            <select jsfc="p:selectOneMenu" id="habilitado" value="#{crudPlanoMb.model.habilitado}" required="true" >
                <option jsfc="f:selectItem" itemValue="true" itemLabel="Sim" >Sim</option>
                <option jsfc="f:selectItem" itemValue="false" itemLabel="Não" >Não</option>
            </select>

            <label jsfc="p:outputLabel" for="sku" value="SKU*" />
            <input jsfc="p:inputText" id="sku" value="#{crudPlanoMb.model.sku}" label="SKU" required="true"
                   title="Campo utilizado para indentificar este plano, após preenche-lo procure não alterar."/>


            <label jsfc="p:outputLabel" for="nome" value="Nome*" />
            <input jsfc="p:inputText" id="nome" value="#{crudPlanoMb.model.nome}" label="Nome" required="true" />

            <label jsfc="p:outputLabel" for="valor" value="Valor*" />
            <input jsfc="p:inputText" id="valor" class="moneyInput"  value="#{crudPlanoMb.model.valorPlano}" label="Valor" required="true" onfocus="adicionarMascaraDinheiro()" >
                <f:convertNumber  locale="pt_BR" pattern="#,##0.00" ></f:convertNumber>
            </input>

            <label jsfc="p:outputLabel" for="maxParcela" value="Num Máximo de Parcelas*" />
            <input jsfc="p:inputText" id="maxParcela"  value="#{crudPlanoMb.model.maxParcela}"  label="Num Máximo de Parcelas*" required="true"  >
            </input>

            <label jsfc="p:outputLabel" for="descricao" value="Descrição*" />
            <input jsfc="p:inputTextarea" id="descricao" value="#{crudPlanoMb.model.descricao}" label="Descrição" required="true" /> 

            <p:outputLabel for="produtos" value="Produtos*" />
            <p:pickList id="produtos"  value="#{crudPlanoMb.produtos}" converter="#{produtoConverter}" 
                        var="produto" itemLabel="#{produto.nome}" itemValue="#{produto}" 
                        addLabel="Adicionar" addAllLabel="Adicionar Todos" removeLabel="Remover" removeAllLabel="Remover Todos" required="true"  >
            </p:pickList>

            <p:outputLabel for="modulos" value="Modulos*" />
            <p:pickList id="modulos"  value="#{crudPlanoMb.modulos}" converter="#{moduloConverter}"
                        var="modulo" itemLabel="#{modulo.nome}" itemValue="#{modulo}" 
                        addLabel="Adicionar" addAllLabel="Adicionar Todos" removeLabel="Remover" removeAllLabel="Remover Todos" required="true">
            </p:pickList>

        </div>
    </div>

</ui:component>
