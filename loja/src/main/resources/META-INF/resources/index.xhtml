<?xml version='1.0' encoding='UTF-8' ?> 
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html" 
                xmlns:p="http://primefaces.org/ui" 
                xmlns:adm="http://github.com/adminfaces"
                template="/WEB-INF/templates/loja/base.xhtml"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:param name="perfil" value="#{perfilMb.perfilAtual}"></ui:param>
    <ui:param name="menuSelect" value="index"></ui:param>

    <ui:define name="conteudoCabecalho">
        <style>
            .bd-placeholder-img {
                font-size: 1.125rem;
                text-anchor: middle;
                -webkit-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
                user-select: none;
            }

            @media (min-width: 768px) {
                .bd-placeholder-img-lg {
                    font-size: 3.5rem;
                }
            }
            .ui-state-error{
                border-color: #ffb157!important;
                background-color: #FDFFDF!important;
            }
            .form-check {
                position: relative;
                display: block;
                padding-left: 0px!important;
            }
            .form-check input{
                margin-right: 5px !important;
            }
            .paineisCompra{
                font-size:14px!important;
            }
            .paineisCompra ul{
                padding: 0px!important;
                padding-left: 5px!important;
            }
            .ui-blockui {
                position: absolute;
                top: 0;
                left: 0;
                text-align: center;
                width: 100%;
                height: 100%;
                background-color: black;
                opacity: 0.2;
            }

            .radioButtons label{
                margin:5px!important;
            }


        </style>
    </ui:define>

    <!-- Linha 100& imagem BG -->

    <ui:define name="conteudo" >
        <ui:include   src="WEB-INF/templates/loja/#{perfil}/index.xhtml"></ui:include>
    </ui:define>

</ui:composition>
